AWSTemplateFormatVersion: '2010-09-09'
Description: 'Account Pool Factory infrastructure in domain account'

Parameters:
  DomainId:
    Type: String
    Description: DataZone domain ID
  
  DomainAccountId:
    Type: String
    Description: Domain account ID
  
  RootDomainUnitId:
    Type: String
    Description: Root domain unit ID
  
  OrgAdminAccountId:
    Type: String
    Description: Organization admin account ID

  OrganizationId:
    Type: String
    Description: AWS Organizations ID (e.g. o-xxxxxxxxxx) — used to scope the central event bus policy to org accounts only
  
  AccountCreationRoleArn:
    Type: String
    Description: ARN of the AccountCreation cross-account role in the Org Admin account (output of org deploy step 1)

  ExternalId:
    Type: String
    Description: ExternalId for assuming the AccountCreation role

  MaxConcurrentSetups:
    Type: Number
    Default: 3
    Description: Maximum concurrent setups

  ProjectPolicyEnabled:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Whether to create a customer-managed policy in pool accounts

  ProjectPolicyName:
    Type: String
    Default: MySageMakerStudioAdminIAMPermissiveExecutionPolicy
    Description: Name of the customer-managed policy for project user roles

Resources:
  # ============================================================
  # DynamoDB Table
  # ============================================================
  AccountStateTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AccountPoolFactory-AccountState
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: accountId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: N
        - AttributeName: state
          AttributeType: S
        - AttributeName: createdDate
          AttributeType: S
        - AttributeName: projectId
          AttributeType: S
        - AttributeName: assignedDate
          AttributeType: S
        - AttributeName: poolName
          AttributeType: S
      KeySchema:
        - AttributeName: accountId
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: StateIndex
          KeySchema:
            - AttributeName: state
              KeyType: HASH
            - AttributeName: createdDate
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: ProjectIndex
          KeySchema:
            - AttributeName: projectId
              KeyType: HASH
            - AttributeName: assignedDate
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: PoolIndex
          KeySchema:
            - AttributeName: poolName
              KeyType: HASH
            - AttributeName: state
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: ManagedBy
          Value: AccountPoolFactory

  # ============================================================
  # SNS Topic
  # ============================================================
  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: AccountPoolFactory-Alerts
      DisplayName: Account Pool Factory Alerts
      Tags:
        - Key: ManagedBy
          Value: AccountPoolFactory

  # ============================================================
  # EventBridge
  # ============================================================
  CentralEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: AccountPoolFactory-CentralBus
      Tags:
        - Key: ManagedBy
          Value: AccountPoolFactory

  # Resource policy allowing project accounts to put events onto the central bus.
  # Each project account's EventBridgeForwarderRole assumes events.amazonaws.com
  # and calls PutEvents — this policy grants that cross-account access.
  CentralEventBusPolicy:
    Type: AWS::Events::EventBusPolicy
    Properties:
      EventBusName: !Ref CentralEventBus
      StatementId: AllowProjectAccountsToForwardEvents
      Action: events:PutEvents
      Principal: '*'
      Condition:
        Type: StringEquals
        Key: aws:PrincipalOrgID
        Value: !Ref OrganizationId

  # PoolManager is triggered by DataZone events on the default event bus.
  # DataZone emits events (source: aws.datazone) directly to EventBridge when
  # projects are created/deleted and environments are deployed/deleted.
  # This is the reliable trigger for assignment and reclaim detection.
  PoolManagerDataZoneTriggerRule:
    Type: AWS::Events::Rule
    Properties:
      Name: AccountPoolFactory-PoolManager-DataZone-Trigger
      Description: Trigger PoolManager on DataZone project and environment lifecycle events
      EventPattern:
        source:
          - aws.datazone
        detail-type:
          - Project Creation Succeeded
          - Environment Deployment Completed
          - Environment Deletion Completed
          - Environment Deletion Failed
      State: ENABLED
      Targets:
        - Arn: !GetAtt PoolManagerFunction.Arn
          Id: PoolManagerLambda

  PoolManagerInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PoolManagerFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt PoolManagerDataZoneTriggerRule.Arn

  # ============================================================
  # Unified Lambda Execution Role
  # All AccountPoolFactory Lambdas in the domain account share this role.
  # ============================================================
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SMUS-AccountPoolFactory-LambdaExecution-Role
      Description: Shared execution role for all AccountPoolFactory Lambda functions
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AccountPoolFactoryPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # DynamoDB
              - Effect: Allow
                Action:
                  - dynamodb:Query
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:GetItem
                Resource:
                  - !GetAtt AccountStateTable.Arn
                  - !Sub '${AccountStateTable.Arn}/index/*'

              # Lambda invocations (local functions only — ProvisionAccount now runs in this account)
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:ProvisionAccount'
                  - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:PoolManager'
                  - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:SetupOrchestrator'
                  - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:DeprovisionAccount'
                  - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:AccountReconciler'
                  - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:AccountRecycler'

              # Cross-account assume role (Org Admin + project accounts)
              - Effect: Allow
                Action:
                  - sts:AssumeRole
                Resource:
                  - !Sub 'arn:aws:iam::${OrgAdminAccountId}:role/SMUS-AccountPoolFactory-AccountCreation'
                  - 'arn:aws:iam::*:role/SMUS-AccountPoolFactory-DomainAccess'
                  - 'arn:aws:iam::*:role/OrganizationAccountAccessRole'

              # SNS
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref AlertTopic

              # CloudWatch metrics
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                Resource: '*'

              # SSM parameters
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/AccountPoolFactory/*'

              # RAM
              - Effect: Allow
                Action:
                  - ram:*
                Resource: '*'

              # DataZone
              - Effect: Allow
                Action:
                  - datazone:PutDomainSharingPolicy
                  - datazone:GetDomain
                  - datazone:ListEnvironments
                  - datazone:GetEnvironment
                  - datazone:GetProject
                Resource: !Sub 'arn:aws:datazone:${AWS::Region}:${AWS::AccountId}:domain/${DomainId}'

              # Lake Formation — TEMPORARY WORKAROUND for cross-account test data sharing.
              # PoolManager grants LF permissions to project accounts for shared Glue databases.
              # TODO: Remove when proper LF tag-based access control is implemented.
              - Effect: Allow
                Action:
                  - lakeformation:GrantPermissions
                  - lakeformation:RevokePermissions
                  - lakeformation:BatchGrantPermissions
                  - lakeformation:BatchRevokePermissions
                  - lakeformation:GetDataLakeSettings
                  - lakeformation:PutDataLakeSettings
                  - lakeformation:ListPermissions
                Resource: '*'

              # Glue catalog read — needed by LF GrantPermissions to verify databases/tables exist.
              # TEMPORARY WORKAROUND — part of the LF test data sharing setup.
              - Effect: Allow
                Action:
                  - glue:*
                Resource: '*'

              # SQS — send setup jobs to SetupQueue (Recycler/PoolManager)
              # and receive/delete for SetupOrchestrator event source mapping
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueUrl
                  - sqs:GetQueueAttributes
                  - sqs:ChangeMessageVisibility
                Resource:
                  - !GetAtt SetupQueue.Arn
                  - !GetAtt SetupQueueDLQ.Arn

              # KMS (for SSM SecureString)
              - Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: '*'
      Tags:
        - Key: ManagedBy
          Value: AccountPoolFactory

  # ============================================================
  # Lambda Functions (all use LambdaExecutionRole)
  # ============================================================

  PoolManagerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: PoolManager
      Runtime: python3.12
      Handler: lambda_function.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 900
      MemorySize: 512
      ReservedConcurrentExecutions: 10
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref AccountStateTable
          SNS_TOPIC_ARN: !Ref AlertTopic
          SETUP_ORCHESTRATOR_FUNCTION_NAME: !Ref SetupOrchestratorFunction
          DEPROVISION_ACCOUNT_FUNCTION_NAME: !Ref DeprovisionAccountFunction
          SETUP_QUEUE_URL: !Ref SetupQueue
          DOMAIN_ACCOUNT_ID: !Ref DomainAccountId
          DOMAIN_ID: !Ref DomainId
      Code:
        ZipFile: |
          # Placeholder - deploy actual code separately
          def lambda_handler(event, context):
              return {'statusCode': 200, 'body': 'Placeholder'}
      Tags:
        - Key: ManagedBy
          Value: AccountPoolFactory

  SetupOrchestratorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: SetupOrchestrator
      Runtime: python3.12
      Handler: lambda_function.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 900
      MemorySize: 1024
      # No ReservedConcurrentExecutions — controlled by SQS event source mapping MaxConcurrency
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref AccountStateTable
          SNS_TOPIC_ARN: !Ref AlertTopic
          DOMAIN_ID: !Ref DomainId
          DOMAIN_ACCOUNT_ID: !Ref DomainAccountId
          ROOT_DOMAIN_UNIT_ID: !Ref RootDomainUnitId
          ORG_ADMIN_ACCOUNT_ID: !Ref OrgAdminAccountId
      Code:
        ZipFile: |
          # Placeholder - deploy actual code separately
          def lambda_handler(event, context):
              return {'statusCode': 200, 'body': 'Placeholder'}
      Tags:
        - Key: ManagedBy
          Value: AccountPoolFactory

  DeprovisionAccountFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: DeprovisionAccount
      Runtime: python3.12
      Handler: lambda_function.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 900
      MemorySize: 512
      ReservedConcurrentExecutions: 3
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref AccountStateTable
          SNS_TOPIC_ARN: !Ref AlertTopic
          DOMAIN_ID: !Ref DomainId
          DELETION_TIMEOUT: '600'
          MAX_RETRIES: '3'
      Code:
        ZipFile: |
          # Placeholder - deploy actual code separately
          def lambda_handler(event, context):
              return {'statusCode': 200, 'body': 'Placeholder'}
      Tags:
        - Key: ManagedBy
          Value: AccountPoolFactory

  # ============================================================
  # ProvisionAccount Lambda
  # Assumes AccountCreation role in Org Admin to call Organizations + StackSet APIs.
  # Invoked locally by PoolManager and AccountRecycler (same account).
  # Uses the shared LambdaExecutionRole which already has sts:AssumeRole on AccountCreationRole.
  # ============================================================

  ProvisionAccountFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: ProvisionAccount
      Runtime: python3.12
      Handler: lambda_function.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 600
      MemorySize: 512
      ReservedConcurrentExecutions: 5
      Environment:
        Variables:
          ACCOUNT_CREATION_ROLE_ARN: !Ref AccountCreationRoleArn
          EXTERNAL_ID: !Ref ExternalId
          AWS_REGION_NAME: !Ref AWS::Region
          DOMAIN_ID: !Ref DomainId
          DOMAIN_ACCOUNT_ID: !Ref DomainAccountId
          ORG_ADMIN_ACCOUNT_ID: !Ref OrgAdminAccountId
      Code:
        ZipFile: |
          # Placeholder - deploy actual code via deploy script
          def lambda_handler(event, context):
              return {'statusCode': 200, 'body': 'Placeholder'}
      Tags:
        - Key: ManagedBy
          Value: AccountPoolFactory

  # ============================================================
  # Account Provider (DataZone Account Pool integration)
  # ============================================================

  # DataZone assumes this role to invoke the AccountProvider Lambda
  AccountResolutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SMUS-AccountPoolFactory-AccountResolution-Role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: datazone.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambdaPermission
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt AccountProviderFunction.Arn
      Tags:
        - Key: ManagedBy
          Value: AccountPoolFactory

  AccountProviderFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: AccountProvider
      Description: Queries DynamoDB for available accounts and returns them to DataZone
      Runtime: python3.12
      Handler: lambda_function_prod.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60
      MemorySize: 256
      Environment:
        Variables:
          TABLE_NAME: !Ref AccountStateTable
          SNS_TOPIC_ARN: !Ref AlertTopic
          DOMAIN_ID: !Ref DomainId
      Code:
        ZipFile: |
          # Placeholder - deploy actual code separately
          def lambda_handler(event, context):
              return {'statusCode': 200, 'body': 'Placeholder'}
      Tags:
        - Key: ManagedBy
          Value: AccountPoolFactory

  AccountProviderLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/AccountProvider
      RetentionInDays: 7

  # ============================================================
  # Account Reconciler & Recycler
  # ============================================================

  AccountReconcilerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: AccountReconciler
      Description: Reconciles AWS Organizations accounts with DynamoDB pool state
      Runtime: python3.12
      Handler: lambda_function.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      MemorySize: 512
      ReservedConcurrentExecutions: 1
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref AccountStateTable
          SNS_TOPIC_ARN: !Ref AlertTopic
          DOMAIN_ID: !Ref DomainId
          DOMAIN_ACCOUNT_ID: !Ref DomainAccountId
          ORG_ADMIN_ACCOUNT_ID: !Ref OrgAdminAccountId
          ACCOUNT_RECYCLER_FUNCTION_NAME: !Ref AccountRecyclerFunction
          POOL_MANAGER_FUNCTION_NAME: !Ref PoolManagerFunction
      Code:
        ZipFile: |
          # Placeholder - deploy actual code separately
          def lambda_handler(event, context):
              return {'statusCode': 200, 'body': 'Placeholder'}
      Tags:
        - Key: ManagedBy
          Value: AccountPoolFactory

  AccountReconcilerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/AccountReconciler
      RetentionInDays: 7

  AccountRecyclerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: AccountRecycler
      Description: Recycles failed/orphaned accounts back to AVAILABLE state
      Runtime: python3.12
      Handler: lambda_function.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 900
      MemorySize: 512
      ReservedConcurrentExecutions: 10
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref AccountStateTable
          SNS_TOPIC_ARN: !Ref AlertTopic
          DOMAIN_ID: !Ref DomainId
          DOMAIN_ACCOUNT_ID: !Ref DomainAccountId
          ORG_ADMIN_ACCOUNT_ID: !Ref OrgAdminAccountId
          DEPROVISION_ACCOUNT_FUNCTION_NAME: !Ref DeprovisionAccountFunction
          SETUP_ORCHESTRATOR_FUNCTION_NAME: !Ref SetupOrchestratorFunction
          SETUP_QUEUE_URL: !Ref SetupQueue
          PROVISION_ACCOUNT_FUNCTION_ARN: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:ProvisionAccount'
      Code:
        ZipFile: |
          # Placeholder - deploy actual code separately
          def lambda_handler(event, context):
              return {'statusCode': 200, 'body': 'Placeholder'}
      Tags:
        - Key: ManagedBy
          Value: AccountPoolFactory

  AccountRecyclerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/AccountRecycler
      RetentionInDays: 7

  # ============================================================
  # SQS Queue for SetupOrchestrator
  # Controls parallelism via event source mapping MaxConcurrency.
  # Replaces direct Lambda invocations from Recycler and PoolManager.
  # ============================================================

  SetupQueueDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: AccountPoolFactory-SetupQueue-DLQ
      MessageRetentionPeriod: 1209600  # 14 days
      Tags:
        - Key: ManagedBy
          Value: AccountPoolFactory

  SetupQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: AccountPoolFactory-SetupQueue
      VisibilityTimeout: 900          # Must be >= SetupOrchestrator timeout
      MessageRetentionPeriod: 86400   # 24 hours
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt SetupQueueDLQ.Arn
        maxReceiveCount: 3
      Tags:
        - Key: ManagedBy
          Value: AccountPoolFactory

  SetupOrchestratorSQSTrigger:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt SetupQueue.Arn
      FunctionName: !GetAtt SetupOrchestratorFunction.Arn
      BatchSize: 1
      FunctionResponseTypes:
        - ReportBatchItemFailures
      ScalingConfig:
        MaximumConcurrency: 10        # Knob: how many SetupOrchestrators run in parallel



  ReconcilerScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: AccountPoolFactory-ReconcilerSchedule
      Description: Runs AccountReconciler hourly to detect drift and trigger self-healing
      ScheduleExpression: rate(1 hour)
      State: ENABLED
      Targets:
        - Id: AccountReconcilerTarget
          Arn: !GetAtt AccountReconcilerFunction.Arn
          Input: '{"source":"schedule","autoRecycle":true,"autoReplenish":true}'

  ReconcilerSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AccountReconcilerFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ReconcilerScheduleRule.Arn

  # ============================================================
  # SSM Parameters
  # ============================================================

  # Setup Orchestrator
  DomainIdParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /AccountPoolFactory/SetupOrchestrator/DomainId
      Type: String
      Value: !Ref DomainId
      Description: DataZone domain ID

  DomainAccountIdParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /AccountPoolFactory/SetupOrchestrator/DomainAccountId
      Type: String
      Value: !Ref DomainAccountId
      Description: Domain account ID

  RootDomainUnitIdParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /AccountPoolFactory/SetupOrchestrator/RootDomainUnitId
      Type: String
      Value: !Ref RootDomainUnitId
      Description: Root domain unit ID

  AlertTopicArnParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /AccountPoolFactory/SetupOrchestrator/AlertTopicArn
      Type: String
      Value: !Ref AlertTopic
      Description: SNS topic ARN for alerts

  ProjectPolicyEnabledParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /AccountPoolFactory/SetupOrchestrator/ProjectPolicyEnabled
      Type: String
      Value: !Ref ProjectPolicyEnabled
      Description: Whether to create customer-managed policy in pool accounts

  ProjectPolicyNameParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /AccountPoolFactory/SetupOrchestrator/ProjectPolicyName
      Type: String
      Value: !Ref ProjectPolicyName
      Description: Name of the customer-managed policy for project user roles

  # Reconciler/Recycler
  MaxRecycleRetriesParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /AccountPoolFactory/PoolManager/MaxRecycleRetries
      Type: String
      Value: '3'
      Description: Maximum number of recycle retry attempts per account

  MaxConcurrentRecyclesParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /AccountPoolFactory/PoolManager/MaxConcurrentRecycles
      Type: String
      Value: '10'
      Description: Maximum concurrent account recycles

  SetupQueueMaxConcurrencyParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /AccountPoolFactory/PoolManager/SetupQueueMaxConcurrency
      Type: String
      Value: '10'
      Description: Max concurrent SetupOrchestrator invocations via SQS (controls SQS event source mapping)

Outputs:
  ProvisionAccountRoleArn:
    Description: >
      ARN of the shared Lambda execution role.
      Pass this to the Org Admin deploy script as ProvisionAccountRoleArn.
      The AccountCreationRole trust policy will be scoped to this role.
    Value: !GetAtt LambdaExecutionRole.Arn
    Export:
      Name: AccountPoolFactory-ProvisionAccountRoleArn

  DynamoDBTableName:
    Description: DynamoDB table name
    Value: !Ref AccountStateTable
    Export:
      Name: AccountPoolFactory-TableName

  SNSTopicArn:
    Description: SNS topic ARN
    Value: !Ref AlertTopic
    Export:
      Name: AccountPoolFactory-AlertTopicArn

  CentralEventBusArn:
    Description: Central event bus ARN
    Value: !GetAtt CentralEventBus.Arn
    Export:
      Name: AccountPoolFactory-CentralEventBusArn

  LambdaExecutionRoleArn:
    Description: Shared Lambda execution role ARN
    Value: !GetAtt LambdaExecutionRole.Arn
    Export:
      Name: AccountPoolFactory-LambdaExecutionRoleArn

  PoolManagerFunctionArn:
    Description: Pool Manager Lambda function ARN
    Value: !GetAtt PoolManagerFunction.Arn
    Export:
      Name: AccountPoolFactory-PoolManagerArn

  SetupOrchestratorFunctionArn:
    Description: Setup Orchestrator Lambda function ARN
    Value: !GetAtt SetupOrchestratorFunction.Arn
    Export:
      Name: AccountPoolFactory-SetupOrchestratorArn

  DeprovisionAccountFunctionArn:
    Description: Deprovision Account Lambda function ARN
    Value: !GetAtt DeprovisionAccountFunction.Arn
    Export:
      Name: AccountPoolFactory-DeprovisionAccountArn

  AccountProviderFunctionArn:
    Description: Account Provider Lambda function ARN
    Value: !GetAtt AccountProviderFunction.Arn
    Export:
      Name: AccountPoolFactory-AccountProviderArn

  AccountResolutionRoleArn:
    Description: Account Resolution Role ARN (used by DataZone to invoke Lambda)
    Value: !GetAtt AccountResolutionRole.Arn
    Export:
      Name: AccountPoolFactory-AccountResolutionRoleArn

  AccountReconcilerFunctionArn:
    Description: Account Reconciler Lambda function ARN
    Value: !GetAtt AccountReconcilerFunction.Arn
    Export:
      Name: AccountPoolFactory-AccountReconcilerArn

  AccountRecyclerFunctionArn:
    Description: Account Recycler Lambda function ARN
    Value: !GetAtt AccountRecyclerFunction.Arn
    Export:
      Name: AccountPoolFactory-AccountRecyclerArn

  SetupQueueUrl:
    Description: SQS queue URL for SetupOrchestrator jobs
    Value: !Ref SetupQueue
    Export:
      Name: AccountPoolFactory-SetupQueueUrl

  SetupQueueArn:
    Description: SQS queue ARN for SetupOrchestrator jobs
    Value: !GetAtt SetupQueue.Arn
    Export:
      Name: AccountPoolFactory-SetupQueueArn

  ProvisionAccountFunctionArn:
    Description: ProvisionAccount Lambda function ARN
    Value: !GetAtt ProvisionAccountFunction.Arn
    Export:
      Name: AccountPoolFactory-ProvisionAccountArn
