AWSTemplateFormatVersion: '2010-09-09'
Description: 'SMUS Account Pool Factory - StackSet Administration Role (assumed by CloudFormation service to manage StackSet instances across accounts)'

Resources:
  # Administration role in the Org Admin account
  # Assumed by CloudFormation service to deploy StackSet instances into project accounts
  # The execution role (SMUS-AccountPoolFactory-StackSetExecution) in each project account trusts this role
  StackSetAdministrationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SMUS-AccountPoolFactory-StackSetAdmin
      Description: Assumed by CloudFormation service to manage AccountPoolFactory StackSet instances across project accounts
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AssumeStackSetExecutionRole
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sts:AssumeRole
                Resource: 'arn:aws:iam::*:role/SMUS-AccountPoolFactory-StackSetExecution'
      Tags:
        - Key: Project
          Value: AccountPoolFactory
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  AdministrationRoleArn:
    Description: ARN of the StackSet Administration Role
    Value: !GetAtt StackSetAdministrationRole.Arn
    Export:
      Name: SMUS-AccountPoolFactory-StackSetAdminRoleArn
