AWSTemplateFormatVersion: '2010-09-09'
Description: Account Provider Lambda for DataZone Account Pool

Parameters:
  DomainId:
    Type: String
    Description: DataZone Domain ID
    AllowedPattern: '^dzd-[a-z0-9]{14}$'

Resources:
  # Account Resolution Role - DataZone assumes this role to invoke the Lambda
  AccountResolutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'AccountResolutionRole-${DomainId}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: datazone.amazonaws.com
            Action: sts:AssumeRole
            # NOTE: Conditions commented out due to DataZone API bug
            # The ListAccountsInAccountPool API doesn't pass sourceAccount/sourceArn context keys
            # Condition:
            #   StringEquals:
            #     'aws:SourceAccount': !Ref AWS::AccountId
            #   ArnEquals:
            #     'aws:SourceArn': !Sub 'arn:aws:datazone:${AWS::Region}:${AWS::AccountId}:domain/${DomainId}'
      Policies:
        - PolicyName: InvokeLambdaPermission
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt AccountProviderFunction.Arn

  # Lambda Execution Role - Lambda uses this role when executing
  AccountProviderLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'AccountProviderLambdaRole-${DomainId}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AccountProviderPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/AccountProvider-${DomainId}:*'

  # CloudWatch Log Group
  AccountProviderLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/AccountProvider-${DomainId}'
      RetentionInDays: 7

  # Lambda Function
  AccountProviderFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'AccountProvider-${DomainId}'
      Description: Simple account provider for DataZone account pool (returns hardcoded test account)
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt AccountProviderLambdaRole.Arn
      Timeout: 60
      MemorySize: 256
      Code:
        ZipFile: |
          import json
          import logging
          
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          
          # Hardcoded test account
          TEST_ACCOUNT = {
              "awsAccountId": "004878717744",
              "awsAccountName": "TestAccount-100",
              "supportedRegions": ["us-east-2", "us-east-1"]
          }
          
          def lambda_handler(event, context):
              """
              Handle account pool requests from DataZone
              
              Expected event structure:
              {
                  "operationRequest": {
                      "listAuthorizedAccountsRequest": {} or
                      "validateAccountAuthorizationRequest": {"awsAccountId": "...", "awsRegion": "..."}
                  }
              }
              """
              
              logger.info("=" * 80)
              logger.info("🚀 Account Provider Lambda invoked")
              logger.info("=" * 80)
              logger.info(f"📥 Event: {json.dumps(event, indent=2)}")
              logger.info(f"📋 Context: request_id={context.aws_request_id}, function_name={context.function_name}")
              
              try:
                  operation_request = event.get('operationRequest', {})
                  
                  if 'listAuthorizedAccountsRequest' in operation_request and operation_request['listAuthorizedAccountsRequest'] is not None:
                      logger.info("📋 ListAuthorizedAccountsRequest received")
                      response = list_authorized_accounts()
                  elif 'validateAccountAuthorizationRequest' in operation_request and operation_request['validateAccountAuthorizationRequest'] is not None:
                      logger.info("✅ ValidateAccountAuthorizationRequest received")
                      response = validate_account_authorization(operation_request['validateAccountAuthorizationRequest'])
                  else:
                      error_msg = f"❌ Unsupported operation: {operation_request}"
                      logger.error(error_msg)
                      raise Exception(error_msg)
                  
                  logger.info("=" * 80)
                  logger.info("✅ Returning response")
                  logger.info("=" * 80)
                  logger.info(f"📤 Response: {json.dumps(response, indent=2)}")
                  
                  return response
                  
              except Exception as e:
                  logger.error("=" * 80)
                  logger.error("❌ ERROR occurred in Account Provider Lambda")
                  logger.error("=" * 80)
                  logger.error(f"Error: {str(e)}", exc_info=True)
                  raise
          
          def list_authorized_accounts():
              """Return list of authorized accounts"""
              return {
                  'operationResponse': {
                      'listAuthorizedAccountsResponse': {
                          'items': [TEST_ACCOUNT]
                      }
                  }
              }
          
          def validate_account_authorization(request):
              """Validate if account/region pair is authorized"""
              account_id = request.get('awsAccountId')
              region = request.get('awsRegion')
              
              logger.info(f"🔍 Validating account: {account_id}, region: {region}")
              
              # Check if requested account matches our test account
              if account_id == TEST_ACCOUNT['awsAccountId'] and region in TEST_ACCOUNT['supportedRegions']:
                  auth_result = 'GRANT'
                  logger.info(f"✅ Authorization GRANTED for {account_id} in {region}")
              else:
                  auth_result = 'DENY'
                  logger.info(f"❌ Authorization DENIED for {account_id} in {region}")
              
              return {
                  'operationResponse': {
                      'validateAccountAuthorizationResponse': {
                          'authResult': auth_result
                      }
                  }
              }

Outputs:
  LambdaFunctionArn:
    Description: Account Provider Lambda Function ARN
    Value: !GetAtt AccountProviderFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-FunctionArn'

  LambdaRoleArn:
    Description: Account Provider Lambda Execution Role ARN
    Value: !GetAtt AccountProviderLambdaRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-LambdaRoleArn'

  AccountResolutionRoleArn:
    Description: Account Resolution Role ARN (used by DataZone to invoke Lambda)
    Value: !GetAtt AccountResolutionRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-AccountResolutionRoleArn'

  LogGroupName:
    Description: CloudWatch Log Group Name
    Value: !Ref AccountProviderLogGroup
    Export:
      Name: !Sub '${AWS::StackName}-LogGroup'
