AWSTemplateFormatVersion: '2010-09-09'
Description: 'CF2 - DataZone Domain Sharing Setup (Domain Account) - CORRECTED'
Transform: AWS::LanguageExtensions

Parameters:
  DomainId:
    Type: String
    Description: DataZone Domain ID to share
  
  DomainName:
    Type: String
    Description: DataZone Domain Name
  
  DomainArn:
    Type: String
    Description: DataZone Domain ARN
  
  ProjectAccountIds:
    Type: CommaDelimitedList
    Description: Comma-separated list of AWS account IDs to share the domain with
    Default: ""
  
  EnableSharing:
    Type: String
    Description: Enable domain sharing via RAM
    Default: "true"
    AllowedValues:
      - "true"
      - "false"

Conditions:
  ShouldCreateShares: !And
    - !Equals [!Ref EnableSharing, "true"]
    - !Not [!Equals [!Join ["", !Ref ProjectAccountIds], ""]]

Resources:
  # Create individual RAM ResourceShare for each project account
  # CRITICAL: Use the correct permission ARN that includes portal access
  "Fn::ForEach::Accounts":
    - AccountId
    - !If
      - ShouldCreateShares
      - !Ref ProjectAccountIds
      - !Ref AWS::NoValue
    - "RAMResourceShare${AccountId}":
        Type: "AWS::RAM::ResourceShare"
        Properties:
          Name: !Sub "DataZone-EXTENDED_PORTAL_ACCESS-${DomainId}-${AccountId}"
          AllowExternalPrincipals: false
          ResourceArns:
            - !Ref DomainArn
          PermissionArns:
            # CORRECTED: This is the permission ARN that DataZone console uses
            # It includes portal access, not just extended service access
            - "arn:aws:ram::aws:permission/AWSRAMPermissionsAmazonDatazoneDomainExtendedServiceWithPortalAccess"
          Principals:
            - !Ref AccountId
          Tags:
            - Key: DomainId
              Value: !Ref DomainId
            - Key: DomainName
              Value: !Ref DomainName
            - Key: ManagedBy
              Value: AccountPoolFactory
            - Key: AccountId
              Value: !Ref AccountId

Outputs:
  DomainId:
    Description: DataZone Domain ID
    Value: !Ref DomainId
    Export:
      Name: !Sub "${AWS::StackName}-DomainId"
  
  DomainArn:
    Description: DataZone Domain ARN
    Value: !Ref DomainArn
    Export:
      Name: !Sub "${AWS::StackName}-DomainArn"
  
  SharedAccountIds:
    Description: Account IDs that domain is shared with
    Value: !Join [",", !Ref ProjectAccountIds]
    Export:
      Name: !Sub "${AWS::StackName}-SharedAccountIds"
  
  SharingEnabled:
    Description: Whether domain sharing is enabled
    Value: !Ref EnableSharing
    Export:
      Name: !Sub "${AWS::StackName}-SharingEnabled"
  
  PermissionArn:
    Description: RAM permission ARN used for sharing
    Value: "arn:aws:ram::aws:permission/AWSRAMPermissionsAmazonDatazoneDomainExtendedServiceWithPortalAccess"
    Export:
      Name: !Sub "${AWS::StackName}-PermissionArn"
