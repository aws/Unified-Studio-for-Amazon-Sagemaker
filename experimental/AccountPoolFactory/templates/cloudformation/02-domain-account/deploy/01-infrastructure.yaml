AWSTemplateFormatVersion: '2010-09-09'
Description: 'Account Pool Factory infrastructure in domain account'

Parameters:
  DomainId:
    Type: String
    Description: DataZone domain ID
  
  DomainAccountId:
    Type: String
    Description: Domain account ID
  
  RootDomainUnitId:
    Type: String
    Description: Root domain unit ID
  
  OrgAdminAccountId:
    Type: String
    Description: Organization admin account ID
  
  ProvisionAccountFunctionArn:
    Type: String
    Description: ARN of ProvisionAccount Lambda in Org Admin account
  
  PoolName:
    Type: String
    Default: AccountPoolFactory
    Description: Name for the account pool
  
  TargetOUId:
    Type: String
    Default: root
    Description: OU ID where accounts should be moved
  
  MinimumPoolSize:
    Type: Number
    Default: 5
    Description: Minimum pool size
  
  TargetPoolSize:
    Type: Number
    Default: 10
    Description: Target pool size
  
  MaxConcurrentSetups:
    Type: Number
    Default: 3
    Description: Maximum concurrent setups

  EmailPrefix:
    Type: String
    Default: accountpool
    Description: Email prefix for account creation
  
  EmailDomain:
    Type: String
    Default: example.com
    Description: Email domain for account creation

  ProjectRoleEnabled:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Whether to create a project execution role in pool accounts

  ProjectRoleName:
    Type: String
    Default: AmazonSageMakerProjectRole
    Description: Name of the project execution role

  ProjectRoleManagedPolicyArn:
    Type: String
    Default: arn:aws:iam::aws:policy/AmazonSageMakerFullAccess
    Description: Managed policy ARN for the project execution role

  ExpectedStackPatterns:
    Type: String
    Default: 'DataZone-VPC-{account_id},DataZone-IAM-{account_id},DataZone-EventBridge-{account_id},DataZone-ProjectRole-{account_id},DataZone-Blueprints-{account_id}'
    Description: Comma-separated stack name patterns deployed by SetupOrchestrator into each project account

Resources:
  # ============================================================
  # DynamoDB Table
  # ============================================================
  AccountStateTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AccountPoolFactory-AccountState
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: accountId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: N
        - AttributeName: state
          AttributeType: S
        - AttributeName: createdDate
          AttributeType: S
        - AttributeName: projectId
          AttributeType: S
        - AttributeName: assignedDate
          AttributeType: S
      KeySchema:
        - AttributeName: accountId
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: StateIndex
          KeySchema:
            - AttributeName: state
              KeyType: HASH
            - AttributeName: createdDate
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: ProjectIndex
          KeySchema:
            - AttributeName: projectId
              KeyType: HASH
            - AttributeName: assignedDate
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: ManagedBy
          Value: AccountPoolFactory

  # ============================================================
  # SNS Topic
  # ============================================================
  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: AccountPoolFactory-Alerts
      DisplayName: Account Pool Factory Alerts
      Tags:
        - Key: ManagedBy
          Value: AccountPoolFactory

  # ============================================================
  # EventBridge
  # ============================================================
  CentralEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: AccountPoolFactory-CentralBus
      Tags:
        - Key: ManagedBy
          Value: AccountPoolFactory

  PoolManagerTriggerRule:
    Type: AWS::Events::Rule
    Properties:
      Name: AccountPoolFactory-PoolManager-Trigger
      Description: Trigger Pool Manager on CloudFormation events
      EventBusName: !Ref CentralEventBus
      EventPattern:
        source:
          - aws.cloudformation
        detail-type:
          - CloudFormation Stack Status Change
        detail:
          stack-name:
            - prefix: DataZone-
      State: ENABLED
      Targets:
        - Arn: !GetAtt PoolManagerFunction.Arn
          Id: PoolManagerLambda

  PoolManagerInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PoolManagerFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt PoolManagerTriggerRule.Arn

  # ============================================================
  # Unified Lambda Execution Role
  # All AccountPoolFactory Lambdas in the domain account share this role.
  # ============================================================
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SMUS-AccountPoolFactory-LambdaExecution-Role
      Description: Shared execution role for all AccountPoolFactory Lambda functions
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AccountPoolFactoryPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # DynamoDB
              - Effect: Allow
                Action:
                  - dynamodb:Query
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:GetItem
                Resource:
                  - !GetAtt AccountStateTable.Arn
                  - !Sub '${AccountStateTable.Arn}/index/*'

              # Lambda invocations (self + cross-account ProvisionAccount)
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !Ref ProvisionAccountFunctionArn
                  - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:PoolManager'
                  - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:SetupOrchestrator'
                  - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:DeprovisionAccount'
                  - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:AccountReconciler'
                  - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:AccountRecycler'

              # Cross-account assume role (Org Admin + project accounts)
              - Effect: Allow
                Action:
                  - sts:AssumeRole
                Resource:
                  - !Sub 'arn:aws:iam::${OrgAdminAccountId}:role/SMUS-AccountPoolFactory-AccountCreation'
                  - 'arn:aws:iam::*:role/SMUS-AccountPoolFactory-DomainAccess'
                  - 'arn:aws:iam::*:role/OrganizationAccountAccessRole'

              # SNS
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref AlertTopic

              # CloudWatch metrics
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                Resource: '*'

              # SSM parameters
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/AccountPoolFactory/*'

              # RAM
              - Effect: Allow
                Action:
                  - ram:CreateResourceShare
                  - ram:DeleteResourceShare
                  - ram:AssociateResourceShare
                  - ram:DisassociateResourceShare
                  - ram:GetResourceShares
                  - ram:GetResourceShareAssociations
                  - ram:ListResources
                  - ram:TagResource
                Resource: '*'

              # DataZone
              - Effect: Allow
                Action:
                  - datazone:PutDomainSharingPolicy
                  - datazone:GetDomain
                Resource: !Sub 'arn:aws:datazone:${AWS::Region}:${AWS::AccountId}:domain/${DomainId}'

              # KMS (for SSM SecureString)
              - Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: '*'
      Tags:
        - Key: ManagedBy
          Value: AccountPoolFactory

  # ============================================================
  # Lambda Functions (all use LambdaExecutionRole)
  # ============================================================

  PoolManagerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: PoolManager
      Runtime: python3.12
      Handler: lambda_function.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      MemorySize: 512
      ReservedConcurrentExecutions: 10
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref AccountStateTable
          SNS_TOPIC_ARN: !Ref AlertTopic
          SETUP_ORCHESTRATOR_FUNCTION_NAME: !Ref SetupOrchestratorFunction
          DEPROVISION_ACCOUNT_FUNCTION_NAME: !Ref DeprovisionAccountFunction
          DOMAIN_ACCOUNT_ID: !Ref DomainAccountId
          DOMAIN_ID: !Ref DomainId
      Code:
        ZipFile: |
          # Placeholder - deploy actual code separately
          def lambda_handler(event, context):
              return {'statusCode': 200, 'body': 'Placeholder'}
      Tags:
        - Key: ManagedBy
          Value: AccountPoolFactory

  SetupOrchestratorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: SetupOrchestrator
      Runtime: python3.12
      Handler: lambda_function.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 900
      MemorySize: 1024
      ReservedConcurrentExecutions: 5
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref AccountStateTable
          SNS_TOPIC_ARN: !Ref AlertTopic
          DOMAIN_ID: !Ref DomainId
          DOMAIN_ACCOUNT_ID: !Ref DomainAccountId
          ROOT_DOMAIN_UNIT_ID: !Ref RootDomainUnitId
          ORG_ADMIN_ACCOUNT_ID: !Ref OrgAdminAccountId
      Code:
        ZipFile: |
          # Placeholder - deploy actual code separately
          def lambda_handler(event, context):
              return {'statusCode': 200, 'body': 'Placeholder'}
      Tags:
        - Key: ManagedBy
          Value: AccountPoolFactory

  DeprovisionAccountFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: DeprovisionAccount
      Runtime: python3.12
      Handler: lambda_function.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 900
      MemorySize: 512
      ReservedConcurrentExecutions: 3
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref AccountStateTable
          SNS_TOPIC_ARN: !Ref AlertTopic
          DOMAIN_ID: !Ref DomainId
          DELETION_TIMEOUT: '600'
          MAX_RETRIES: '3'
      Code:
        ZipFile: |
          # Placeholder - deploy actual code separately
          def lambda_handler(event, context):
              return {'statusCode': 200, 'body': 'Placeholder'}
      Tags:
        - Key: ManagedBy
          Value: AccountPoolFactory

  # ============================================================
  # Account Provider (DataZone Account Pool integration)
  # ============================================================

  # DataZone assumes this role to invoke the AccountProvider Lambda
  AccountResolutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SMUS-AccountPoolFactory-AccountResolution-Role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: datazone.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambdaPermission
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt AccountProviderFunction.Arn
      Tags:
        - Key: ManagedBy
          Value: AccountPoolFactory

  AccountProviderFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: AccountProvider
      Description: Queries DynamoDB for available accounts and returns them to DataZone
      Runtime: python3.12
      Handler: lambda_function_prod.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60
      MemorySize: 256
      Environment:
        Variables:
          TABLE_NAME: !Ref AccountStateTable
          SNS_TOPIC_ARN: !Ref AlertTopic
      Code:
        ZipFile: |
          # Placeholder - deploy actual code separately
          def lambda_handler(event, context):
              return {'statusCode': 200, 'body': 'Placeholder'}
      Tags:
        - Key: ManagedBy
          Value: AccountPoolFactory

  AccountProviderLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/AccountProvider
      RetentionInDays: 7

  # ============================================================
  # Account Reconciler & Recycler
  # ============================================================

  AccountReconcilerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: AccountReconciler
      Description: Reconciles AWS Organizations accounts with DynamoDB pool state
      Runtime: python3.12
      Handler: lambda_function.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      MemorySize: 512
      ReservedConcurrentExecutions: 1
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref AccountStateTable
          SNS_TOPIC_ARN: !Ref AlertTopic
          DOMAIN_ID: !Ref DomainId
          DOMAIN_ACCOUNT_ID: !Ref DomainAccountId
          ORG_ADMIN_ACCOUNT_ID: !Ref OrgAdminAccountId
          ACCOUNT_RECYCLER_FUNCTION_NAME: !Ref AccountRecyclerFunction
          POOL_MANAGER_FUNCTION_NAME: !Ref PoolManagerFunction
      Code:
        ZipFile: |
          # Placeholder - deploy actual code separately
          def lambda_handler(event, context):
              return {'statusCode': 200, 'body': 'Placeholder'}
      Tags:
        - Key: ManagedBy
          Value: AccountPoolFactory

  AccountReconcilerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/AccountReconciler
      RetentionInDays: 7

  AccountRecyclerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: AccountRecycler
      Description: Recycles failed/orphaned accounts back to AVAILABLE state
      Runtime: python3.12
      Handler: lambda_function.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 900
      MemorySize: 512
      ReservedConcurrentExecutions: 10
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref AccountStateTable
          SNS_TOPIC_ARN: !Ref AlertTopic
          DOMAIN_ID: !Ref DomainId
          DOMAIN_ACCOUNT_ID: !Ref DomainAccountId
          ORG_ADMIN_ACCOUNT_ID: !Ref OrgAdminAccountId
          DEPROVISION_ACCOUNT_FUNCTION_NAME: !Ref DeprovisionAccountFunction
          SETUP_ORCHESTRATOR_FUNCTION_NAME: !Ref SetupOrchestratorFunction
          PROVISION_ACCOUNT_FUNCTION_ARN: !Ref ProvisionAccountFunctionArn
      Code:
        ZipFile: |
          # Placeholder - deploy actual code separately
          def lambda_handler(event, context):
              return {'statusCode': 200, 'body': 'Placeholder'}
      Tags:
        - Key: ManagedBy
          Value: AccountPoolFactory

  AccountRecyclerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/AccountRecycler
      RetentionInDays: 7

  # ============================================================
  # Self-Healing Schedule — Reconciler runs hourly, triggers Recycler
  # ============================================================

  ReconcilerScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: AccountPoolFactory-ReconcilerSchedule
      Description: Runs AccountReconciler hourly to detect drift and trigger self-healing
      ScheduleExpression: rate(1 hour)
      State: ENABLED
      Targets:
        - Id: AccountReconcilerTarget
          Arn: !GetAtt AccountReconcilerFunction.Arn
          Input: '{"source":"schedule","autoRecycle":true,"autoReplenish":true}'

  ReconcilerSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AccountReconcilerFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ReconcilerScheduleRule.Arn

  # ============================================================
  # SSM Parameters
  # ============================================================

  # Pool Manager
  PoolNameParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /AccountPoolFactory/PoolManager/PoolName
      Type: String
      Value: !Ref PoolName
      Description: Name for the account pool

  TargetOUIdParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /AccountPoolFactory/PoolManager/TargetOUId
      Type: String
      Value: !Ref TargetOUId
      Description: OU ID where accounts should be moved

  MinimumPoolSizeParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /AccountPoolFactory/PoolManager/MinimumPoolSize
      Type: String
      Value: !Ref MinimumPoolSize
      Description: Minimum pool size

  TargetPoolSizeParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /AccountPoolFactory/PoolManager/TargetPoolSize
      Type: String
      Value: !Ref TargetPoolSize
      Description: Target pool size

  MaxConcurrentSetupsParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /AccountPoolFactory/PoolManager/MaxConcurrentSetups
      Type: String
      Value: !Ref MaxConcurrentSetups
      Description: Maximum concurrent setups

  ReclaimStrategyParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /AccountPoolFactory/PoolManager/ReclaimStrategy
      Type: String
      Value: DELETE
      Description: Reclaim strategy (DELETE or REUSE)

  EmailPrefixParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /AccountPoolFactory/PoolManager/EmailPrefix
      Type: String
      Value: !Ref EmailPrefix
      Description: Email prefix for account creation

  EmailDomainParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /AccountPoolFactory/PoolManager/EmailDomain
      Type: String
      Value: !Ref EmailDomain
      Description: Email domain for account creation

  NamePrefixParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /AccountPoolFactory/PoolManager/NamePrefix
      Type: String
      Value: DataZone-Pool
      Description: Account name prefix

  # Setup Orchestrator
  DomainIdParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /AccountPoolFactory/SetupOrchestrator/DomainId
      Type: String
      Value: !Ref DomainId
      Description: DataZone domain ID

  DomainAccountIdParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /AccountPoolFactory/SetupOrchestrator/DomainAccountId
      Type: String
      Value: !Ref DomainAccountId
      Description: Domain account ID

  RootDomainUnitIdParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /AccountPoolFactory/SetupOrchestrator/RootDomainUnitId
      Type: String
      Value: !Ref RootDomainUnitId
      Description: Root domain unit ID

  AlertTopicArnParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /AccountPoolFactory/SetupOrchestrator/AlertTopicArn
      Type: String
      Value: !Ref AlertTopic
      Description: SNS topic ARN for alerts

  ProjectRoleEnabledParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /AccountPoolFactory/SetupOrchestrator/ProjectRoleEnabled
      Type: String
      Value: !Ref ProjectRoleEnabled
      Description: Whether to create project execution role in pool accounts

  ProjectRoleNameParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /AccountPoolFactory/SetupOrchestrator/ProjectRoleName
      Type: String
      Value: !Ref ProjectRoleName
      Description: Name of the project execution role

  ProjectRoleManagedPolicyArnParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /AccountPoolFactory/SetupOrchestrator/ProjectRoleManagedPolicyArn
      Type: String
      Value: !Ref ProjectRoleManagedPolicyArn
      Description: Managed policy ARN for the project execution role

  ExpectedStackPatternsParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /AccountPoolFactory/SetupOrchestrator/ExpectedStackPatterns
      Type: String
      Value: !Ref ExpectedStackPatterns
      Description: Comma-separated stack name patterns deployed by SetupOrchestrator. Used by Reconciler to validate AVAILABLE accounts.

  # Reconciler/Recycler
  MaxRecycleRetriesParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /AccountPoolFactory/PoolManager/MaxRecycleRetries
      Type: String
      Value: '3'
      Description: Maximum number of recycle retry attempts per account

  MaxConcurrentRecyclesParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /AccountPoolFactory/PoolManager/MaxConcurrentRecycles
      Type: String
      Value: '10'
      Description: Maximum concurrent account recycles

Outputs:
  DynamoDBTableName:
    Description: DynamoDB table name
    Value: !Ref AccountStateTable
    Export:
      Name: AccountPoolFactory-TableName

  SNSTopicArn:
    Description: SNS topic ARN
    Value: !Ref AlertTopic
    Export:
      Name: AccountPoolFactory-AlertTopicArn

  CentralEventBusArn:
    Description: Central event bus ARN
    Value: !GetAtt CentralEventBus.Arn
    Export:
      Name: AccountPoolFactory-CentralEventBusArn

  LambdaExecutionRoleArn:
    Description: Shared Lambda execution role ARN
    Value: !GetAtt LambdaExecutionRole.Arn
    Export:
      Name: AccountPoolFactory-LambdaExecutionRoleArn

  PoolManagerFunctionArn:
    Description: Pool Manager Lambda function ARN
    Value: !GetAtt PoolManagerFunction.Arn
    Export:
      Name: AccountPoolFactory-PoolManagerArn

  SetupOrchestratorFunctionArn:
    Description: Setup Orchestrator Lambda function ARN
    Value: !GetAtt SetupOrchestratorFunction.Arn
    Export:
      Name: AccountPoolFactory-SetupOrchestratorArn

  DeprovisionAccountFunctionArn:
    Description: Deprovision Account Lambda function ARN
    Value: !GetAtt DeprovisionAccountFunction.Arn
    Export:
      Name: AccountPoolFactory-DeprovisionAccountArn

  AccountProviderFunctionArn:
    Description: Account Provider Lambda function ARN
    Value: !GetAtt AccountProviderFunction.Arn
    Export:
      Name: AccountPoolFactory-AccountProviderArn

  AccountResolutionRoleArn:
    Description: Account Resolution Role ARN (used by DataZone to invoke Lambda)
    Value: !GetAtt AccountResolutionRole.Arn
    Export:
      Name: AccountPoolFactory-AccountResolutionRoleArn

  AccountReconcilerFunctionArn:
    Description: Account Reconciler Lambda function ARN
    Value: !GetAtt AccountReconcilerFunction.Arn
    Export:
      Name: AccountPoolFactory-AccountReconcilerArn

  AccountRecyclerFunctionArn:
    Description: Account Recycler Lambda function ARN
    Value: !GetAtt AccountRecyclerFunction.Arn
    Export:
      Name: AccountPoolFactory-AccountRecyclerArn
