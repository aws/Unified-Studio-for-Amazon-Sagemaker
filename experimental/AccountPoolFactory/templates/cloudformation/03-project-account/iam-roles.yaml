AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM roles for DataZone (ManageAccessRole and ProvisioningRole)'

Parameters:
  DomainAccountId:
    Type: String
    Description: Domain account ID
  
  DomainId:
    Type: String
    Description: DataZone domain ID

Resources:
  DataZoneManageAccessRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: DataZoneManageAccessRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: datazone.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                'aws:SourceAccount': !Ref DomainAccountId
              ArnLike:
                'aws:SourceArn': !Sub 'arn:aws:datazone:${AWS::Region}:${DomainAccountId}:domain/${DomainId}'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonDataZoneGlueManageAccessRolePolicy
      Policies:
        - PolicyName: DataZoneManageAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lakeformation:*
                  - glue:*
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                  - iam:PassRole
                Resource: '*'
      Tags:
        - Key: ManagedBy
          Value: AccountPoolFactory

  DataZoneProvisioningRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: DataZoneProvisioningRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: datazone.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                'aws:SourceAccount': !Ref DomainAccountId
              ArnLike:
                'aws:SourceArn': !Sub 'arn:aws:datazone:${AWS::Region}:${DomainAccountId}:domain/${DomainId}'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess
      Tags:
        - Key: ManagedBy
          Value: AccountPoolFactory

Outputs:
  ManageAccessRoleArn:
    Description: ARN of DataZoneManageAccessRole
    Value: !GetAtt DataZoneManageAccessRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ManageAccessRoleArn'

  ProvisioningRoleArn:
    Description: ARN of DataZoneProvisioningRole
    Value: !GetAtt DataZoneProvisioningRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ProvisioningRoleArn'
