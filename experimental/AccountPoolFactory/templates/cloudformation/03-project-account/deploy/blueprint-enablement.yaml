          Parameters: {
            "S3Location": !Ref S3Location,
            "Subnets": !Ref Subnets,
            "VpcId": !Ref VpcId
          }
        }
      ]
      EnabledRegions: [ !Ref 'AWS::Region' ]

  DataLake:
