      EnabledRegions: [ !Ref 'AWS::Region' ]

  AmazonBedrockFlow:
    Type: AWS::DataZone::EnvironmentBlueprintConfiguration
    DependsOn: AmazonBedrockFunction
    Properties:
      DomainIdentifier: !Ref DomainId
