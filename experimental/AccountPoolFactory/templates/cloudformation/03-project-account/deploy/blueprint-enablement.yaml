      ManageAccessRoleArn: !Ref ManageAccessRoleArn
      ProvisioningRoleArn: !Ref ProvisioningRoleArn
      RegionalParameters: [
        {
          Region: !Ref 'AWS::Region',
          Parameters: {
            "S3Location": !Ref S3Location,
