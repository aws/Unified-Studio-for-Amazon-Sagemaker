AWSTemplateFormatVersion: 2010-09-09
Description: Enable DataZone blueprints for project account

Parameters:
  DomainId:
    Description: DataZone Domain ID for which blueprints need to be enabled
    Type: String
  
  ManageAccessRoleArn:
    Type: String
    Description: IAM role ARN to manage access to environments
  
  ProvisioningRoleArn:
    Description: IAM role ARN to provision environments
    Type: String
  
  S3Location:
    Type: String
    Description: S3 location for environment artifacts
  
  Subnets:
    Type: String
    Description: Comma-separated list of subnet IDs
  
  VpcId:
    Type: String
    Description: VPC ID for environments

Resources:
  LakehouseCatalog:
    Type: AWS::DataZone::EnvironmentBlueprintConfiguration
    Properties:
      DomainIdentifier: !Ref DomainId
      EnvironmentBlueprintIdentifier: "LakehouseCatalog"
      ManageAccessRoleArn: !Ref ManageAccessRoleArn
      ProvisioningRoleArn: !Ref ProvisioningRoleArn
      RegionalParameters: [
        {
          Region: !Ref 'AWS::Region',
          Parameters: { }
        }
      ]
      EnabledRegions: [ !Ref 'AWS::Region' ]

  AmazonBedrockGuardrail:
    Type: AWS::DataZone::EnvironmentBlueprintConfiguration
    DependsOn: LakehouseCatalog
    Properties:
      DomainIdentifier: !Ref DomainId
      EnvironmentBlueprintIdentifier: "AmazonBedrockGuardrail"
      ManageAccessRoleArn: !Ref ManageAccessRoleArn
      ProvisioningRoleArn: !Ref ProvisioningRoleArn
      RegionalParameters: [
        {
          Region: !Ref 'AWS::Region',
          Parameters: {
            "S3Location": !Ref S3Location,
            "Subnets": !Ref Subnets,
            "VpcId": !Ref VpcId
          }
        }
      ]
      EnabledRegions: [ !Ref 'AWS::Region' ]

  MLExperiments:
    Type: AWS::DataZone::EnvironmentBlueprintConfiguration
    DependsOn: AmazonBedrockGuardrail
    Properties:
      DomainIdentifier: !Ref DomainId
      EnvironmentBlueprintIdentifier: "MLExperiments"
      ManageAccessRoleArn: !Ref ManageAccessRoleArn
      ProvisioningRoleArn: !Ref ProvisioningRoleArn
      RegionalParameters: [
        {
          Region: !Ref 'AWS::Region',
          Parameters: {
            "S3Location": !Ref S3Location,
            "Subnets": !Ref Subnets,
            "VpcId": !Ref VpcId
          }
        }
      ]
      EnabledRegions: [ !Ref 'AWS::Region' ]

  Tooling:
    Type: AWS::DataZone::EnvironmentBlueprintConfiguration
    DependsOn: MLExperiments
    Properties:
      DomainIdentifier: !Ref DomainId
      EnvironmentBlueprintIdentifier: "Tooling"
      ManageAccessRoleArn: !Ref ManageAccessRoleArn
      ProvisioningRoleArn: !Ref ProvisioningRoleArn
      RegionalParameters: [
        {
          Region: !Ref 'AWS::Region',
          Parameters: {
            "S3Location": !Ref S3Location,
            "Subnets": !Ref Subnets,
            "VpcId": !Ref VpcId
          }
        }
      ]
      EnabledRegions: [ !Ref 'AWS::Region' ]

  RedshiftServerless:
    Type: AWS::DataZone::EnvironmentBlueprintConfiguration
    Properties:
      DomainIdentifier: !Ref DomainId
      EnvironmentBlueprintIdentifier: "RedshiftServerless"
      ManageAccessRoleArn: !Ref ManageAccessRoleArn
      ProvisioningRoleArn: !Ref ProvisioningRoleArn
      RegionalParameters: [
        {
          Region: !Ref 'AWS::Region',
          Parameters: {
            "S3Location": !Ref S3Location,
            "Subnets": !Ref Subnets,
            "VpcId": !Ref VpcId
          }
        }
      ]
      EnabledRegions: [ !Ref 'AWS::Region' ]

  EmrServerless:
    Type: AWS::DataZone::EnvironmentBlueprintConfiguration
    DependsOn: RedshiftServerless
    Properties:
      DomainIdentifier: !Ref DomainId
      EnvironmentBlueprintIdentifier: "EmrServerless"
      ManageAccessRoleArn: !Ref ManageAccessRoleArn
      ProvisioningRoleArn: !Ref ProvisioningRoleArn
      RegionalParameters: [
        {
          Region: !Ref 'AWS::Region',
          Parameters: {
            "S3Location": !Ref S3Location,
            "Subnets": !Ref Subnets,
            "VpcId": !Ref VpcId
          }
        }
      ]
      EnabledRegions: [ !Ref 'AWS::Region' ]

  Workflows:
