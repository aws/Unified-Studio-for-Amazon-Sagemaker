AWSTemplateFormatVersion: '2010-09-09'
Description: 'Project execution role for SageMaker/DataZone ToolingLite blueprint v1'

Parameters:
  RoleName:
    Type: String
    Default: AmazonSageMakerProjectRole
    Description: Name of the project execution role

  ManagedPolicyArn:
    Type: String
    Default: arn:aws:iam::aws:policy/AmazonSageMakerFullAccess
    Description: Managed policy ARN to attach to the role

Resources:
  ProjectExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      Path: /service-role/
      Description: 'Project execution role for DataZone ToolingLite blueprint'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - datazone.amazonaws.com
                - sagemaker.amazonaws.com
                - glue.amazonaws.com
                - lakeformation.amazonaws.com
                - athena.amazonaws.com
                - bedrock.amazonaws.com
                - redshift.amazonaws.com
                - airflow-serverless.amazonaws.com
                - scheduler.amazonaws.com
                - emr-serverless.amazonaws.com
            Action:
              - sts:AssumeRole
              - sts:TagSession
              - sts:SetContext
              - sts:SetSourceIdentity
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref 'AWS::AccountId'
      ManagedPolicyArns:
        - !Ref ManagedPolicyArn
      Tags:
        - Key: ManagedBy
          Value: AccountPoolFactory

Outputs:
  TemplateVersion:
    Description: Template version - bump to force SetupOrchestrator to update all deployed stacks
    Value: "1"

  ProjectRoleArn:
    Description: ARN of the project execution role
    Value: !GetAtt ProjectExecutionRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ProjectRoleArn'

  ProjectRoleName:
    Description: Name of the project execution role
    Value: !Ref RoleName
