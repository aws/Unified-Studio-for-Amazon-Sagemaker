AWSTemplateFormatVersion: 2010-09-09
Description: Enable DataZone blueprints for project account (IAM domain mode) v2

Parameters:
  DomainId:
    Description: DataZone Domain ID
    Type: String

  ManageAccessRoleArn:
    Type: String
    Description: IAM role ARN to manage access to environments

  ProvisioningRoleArn:
    Description: IAM role ARN to provision environments
    Type: String

  VpcId:
    Type: String
    Description: VPC ID for SageMaker environments

  SubnetIds:
    Type: String
    Description: Comma-separated subnet IDs (3 private subnets)

  S3BucketName:
    Type: String
    Description: S3 bucket for blueprint artifacts (s3://bucket-name)

  DomainUnitId:
    Type: String
    Description: Root domain unit ID for policy grants (cascade to all child units)

Resources:
  Tooling:
    Type: AWS::DataZone::EnvironmentBlueprintConfiguration
    Properties:
      DomainIdentifier: !Ref DomainId
      EnvironmentBlueprintIdentifier: "Tooling"
      ManageAccessRoleArn: !Ref ManageAccessRoleArn
      ProvisioningRoleArn: !Ref ProvisioningRoleArn
      RegionalParameters:
        - Region: !Ref 'AWS::Region'
          Parameters:
            VpcId: !Ref VpcId
            Subnets: !Ref SubnetIds
            S3Location: !Ref S3BucketName
      GlobalParameters:
        projectRolePolicyArns: !Sub 'arn:aws:iam::${AWS::AccountId}:policy/MySageMakerStudioAdminIAMPermissiveExecutionPolicy'
      EnabledRegions:
        - !Ref 'AWS::Region'

  DataLake:
    Type: AWS::DataZone::EnvironmentBlueprintConfiguration
    DependsOn: Tooling
    Properties:
      DomainIdentifier: !Ref DomainId
      EnvironmentBlueprintIdentifier: "DataLake"
      ManageAccessRoleArn: !Ref ManageAccessRoleArn
      ProvisioningRoleArn: !Ref ProvisioningRoleArn
      RegionalParameters:
        - Region: !Ref 'AWS::Region'
          Parameters:
            VpcId: !Ref VpcId
            Subnets: !Ref SubnetIds
            S3Location: !Ref S3BucketName
      EnabledRegions:
        - !Ref 'AWS::Region'

  LakehouseCatalog:
    Type: AWS::DataZone::EnvironmentBlueprintConfiguration
    DependsOn: DataLake
    Properties:
      DomainIdentifier: !Ref DomainId
      EnvironmentBlueprintIdentifier: "LakehouseCatalog"
      ManageAccessRoleArn: !Ref ManageAccessRoleArn
      ProvisioningRoleArn: !Ref ProvisioningRoleArn
      RegionalParameters:
        - Region: !Ref 'AWS::Region'
          Parameters:
            VpcId: !Ref VpcId
            Subnets: !Ref SubnetIds
            S3Location: !Ref S3BucketName
      EnabledRegions:
        - !Ref 'AWS::Region'

  Workflows:
