  # ── Policy Grants — allow CONTRIBUTOR projects in the domain unit to create
  # environments from each blueprint configuration in this account.
  # EntityIdentifier: {this-account-id}:{blueprint-id}  (cascade to child units)

  GrantTooling:
    Type: AWS::DataZone::PolicyGrant
    DependsOn: Tooling
    Properties:
      DomainIdentifier: !Ref DomainId
      EntityType: ENVIRONMENT_BLUEPRINT_CONFIGURATION
      EntityIdentifier: !Sub '${AWS::AccountId}:${Tooling.EnvironmentBlueprintId}'
      PolicyType: CREATE_ENVIRONMENT_FROM_BLUEPRINT
      Detail:
        CreateEnvironmentFromBlueprint: {}
      Principal:
        Project:
          ProjectDesignation: CONTRIBUTOR
          ProjectGrantFilter:
            DomainUnitFilter:
              DomainUnit: !Ref DomainUnitId
              IncludeChildDomainUnits: true

  GrantDataLake:
    Type: AWS::DataZone::PolicyGrant
    DependsOn: DataLake
    Properties:
