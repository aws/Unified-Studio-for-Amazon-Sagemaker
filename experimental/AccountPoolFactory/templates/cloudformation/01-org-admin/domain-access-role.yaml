AWSTemplateFormatVersion: '2010-09-09'
Description: 'Cross-account role for Domain account to access project accounts'

Parameters:
  DomainAccountId:
    Type: String
    Description: Domain account ID that will assume this role
    AllowedPattern: '^\d{12}$'
  
  DomainId:
    Type: String
    Description: DataZone Domain ID for additional security via ExternalId
    AllowedPattern: '^dzd-[a-z0-9]+$'

Resources:
  DomainAccessRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AccountPoolFactory-DomainAccess
      Description: Allows Domain account Setup Orchestrator to configure this account
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${DomainAccountId}:root'
            Action: 'sts:AssumeRole'
            Condition:
              StringEquals:
                'sts:ExternalId': !Ref DomainId
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AdministratorAccess'
      Tags:
        - Key: Project
          Value: AccountPoolFactory
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  RoleArn:
    Description: ARN of the domain access role
    Value: !GetAtt DomainAccessRole.Arn
    Export:
      Name: AccountPoolFactory-DomainAccessRoleArn
