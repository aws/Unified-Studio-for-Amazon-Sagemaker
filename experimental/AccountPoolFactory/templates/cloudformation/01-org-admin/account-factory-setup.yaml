AWSTemplateFormatVersion: '2010-09-09'
Description: 'Account Pool Factory - CF1: Organization Admin Account Setup for Multi-Strategy Account Creation'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: 'Account Creation Strategy'
        Parameters:
          - AccountCreationStrategy
      - Label:
          default: 'Requesting Account Configuration'
        Parameters:
          - RequestingAccountId
      - Label:
          default: 'Event Bridge Configuration'
        Parameters:
          - EventBusName
          - EnableEventForwarding
      - Label:
          default: 'Control Tower Configuration (Strategy 1)'
        Parameters:
          - ControlTowerProductId
      - Label:
          default: 'Organizations API Configuration (Strategy 2)'
        Parameters:
          - OrganizationsRoleName
          - IamUserAccessToBilling
      - Label:
          default: 'Tagging'
        Parameters:
          - ProjectTag
          - EnvironmentTag
          - OwnerTag

Parameters:
  AccountCreationStrategy:
    Type: String
    Description: Account creation strategy to use
    Default: organizations_api
    AllowedValues:
      - control_tower
      - organizations_api
      - both

  RequestingAccountId:
    Type: String
    Description: AWS Account ID that will request account creation
    AllowedPattern: '^\d{12}$'
    ConstraintDescription: Must be a valid 12-digit AWS account ID
  
  EventBusName:
    Type: String
    Description: Name of the EventBridge event bus for account lifecycle events
    Default: AccountPoolFactoryEventBus
    AllowedPattern: '^[\w.-]{1,256}$'
  
  EnableEventForwarding:
    Type: String
    Description: Enable forwarding of account creation events to requesting account
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
  
  # Control Tower Parameters
  ControlTowerProductId:
    Type: String
    Description: Service Catalog Product ID for Control Tower Account Factory (required for control_tower strategy)
    Default: ''
  
  # Organizations API Parameters
  OrganizationsRoleName:
    Type: String
    Description: Name of IAM role to create in new accounts (for organizations_api strategy)
    Default: OrganizationAccountAccessRole
    AllowedPattern: '^[\w+=,.@-]{1,64}$'
  
  IamUserAccessToBilling:
    Type: String
    Description: Allow IAM users to access billing (for organizations_api strategy)
    Default: ALLOW
    AllowedValues:
      - ALLOW
      - DENY
  
  ProjectTag:
    Type: String
    Description: Value for Project tag
    Default: AccountPoolFactory
  
  EnvironmentTag:
    Type: String
    Description: Value for Environment tag
    Default: Production
    AllowedValues:
      - Development
      - Test
      - Staging
      - Production
  
  OwnerTag:
    Type: String
    Description: Value for Owner tag
    Default: DataZoneAdmin

Conditions:
  EnableForwarding: !Equals [!Ref EnableEventForwarding, 'true']
  UseControlTower: !Or
    - !Equals [!Ref AccountCreationStrategy, 'control_tower']
    - !Equals [!Ref AccountCreationStrategy, 'both']
  UseOrganizationsApi: !Or
    - !Equals [!Ref AccountCreationStrategy, 'organizations_api']
    - !Equals [!Ref AccountCreationStrategy, 'both']
  HasControlTowerProductId: !Not [!Equals [!Ref ControlTowerProductId, '']]

Resources:
  # IAM Role for requesting account to assume for account creation
  AccountCreationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-AcctCreation'
      Description: Allows requesting account to create accounts using selected strategy
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${RequestingAccountId}:root'
            Action: 'sts:AssumeRole'
            Condition:
              StringEquals:
                'sts:ExternalId': !Sub '${AWS::StackName}-${RequestingAccountId}'
      ManagedPolicyArns:
        - !If [UseControlTower, !Ref ControlTowerAccountCreationPolicy, !Ref 'AWS::NoValue']
        - !If [UseOrganizationsApi, !Ref OrganizationsApiAccountCreationPolicy, !Ref 'AWS::NoValue']
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Environment
          Value: !Ref EnvironmentTag
        - Key: Owner
          Value: !Ref OwnerTag
        - Key: ManagedBy
          Value: CloudFormation

  # Policy for Control Tower account creation (Strategy 1)
  ControlTowerAccountCreationPolicy:
    Type: AWS::IAM::ManagedPolicy
    Condition: UseControlTower
    Properties:
      ManagedPolicyName: !Sub '${AWS::StackName}-ControlTowerPolicy'
      Description: Permissions for Control Tower Account Factory account creation
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: ServiceCatalogAccountFactory
            Effect: Allow
            Action:
              - 'servicecatalog:ProvisionProduct'
              - 'servicecatalog:DescribeProvisionedProduct'
              - 'servicecatalog:DescribeRecord'
              - 'servicecatalog:ListProvisionedProductPlans'
              - 'servicecatalog:ListRecordHistory'
              - 'servicecatalog:ScanProvisionedProducts'
              - 'servicecatalog:TerminateProvisionedProduct'
              - 'servicecatalog:UpdateProvisionedProduct'
              - 'servicecatalog:SearchProducts'
              - 'servicecatalog:DescribeProduct'
              - 'servicecatalog:DescribeProductView'
              - 'servicecatalog:DescribeProvisioningParameters'
              - 'servicecatalog:ListLaunchPaths'
            Resource: '*'
            Condition:
              StringEquals:
                'servicecatalog:productType': 'CONTROL_TOWER_ACCOUNT'
          
          - Sid: OrganizationsRead
            Effect: Allow
            Action:
              - 'organizations:DescribeOrganization'
              - 'organizations:DescribeOrganizationalUnit'
              - 'organizations:DescribeAccount'
              - 'organizations:ListAccounts'
              - 'organizations:ListAccountsForParent'
              - 'organizations:ListOrganizationalUnitsForParent'
              - 'organizations:ListRoots'
            Resource: '*'
          
          - Sid: SSORead
            Effect: Allow
            Action:
              - 'sso:GetProfile'
              - 'sso:ListProfiles'
              - 'sso:ListDirectoryAssociations'
            Resource: '*'

  # Policy for Organizations API account creation (Strategy 2)
  OrganizationsApiAccountCreationPolicy:
    Type: AWS::IAM::ManagedPolicy
    Condition: UseOrganizationsApi
    Properties:
      ManagedPolicyName: !Sub '${AWS::StackName}-OrganizationsApiPolicy'
      Description: Permissions for Organizations API account creation
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: OrganizationsAccountCreation
            Effect: Allow
            Action:
              - 'organizations:CreateAccount'
              - 'organizations:DescribeCreateAccountStatus'
              - 'organizations:MoveAccount'
              - 'organizations:TagResource'
              - 'organizations:ListTagsForResource'
            Resource: '*'
          
          - Sid: OrganizationsRead
            Effect: Allow
            Action:
              - 'organizations:DescribeOrganization'
              - 'organizations:DescribeOrganizationalUnit'
              - 'organizations:DescribeAccount'
              - 'organizations:ListAccounts'
              - 'organizations:ListAccountsForParent'
              - 'organizations:ListOrganizationalUnitsForParent'
              - 'organizations:ListRoots'
            Resource: '*'
          
          - Sid: EventBridgePutEvents
            Effect: Allow
            Action:
              - 'events:PutEvents'
            Resource: !GetAtt AccountLifecycleEventBus.Arn

  # EventBridge Event Bus for account lifecycle events
  AccountLifecycleEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref EventBusName
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Environment
          Value: !Ref EnvironmentTag
        - Key: Owner
          Value: !Ref OwnerTag

  # EventBridge Rule to capture Control Tower account creation events
  ControlTowerAccountCreationRule:
    Type: AWS::Events::Rule
    Condition: UseControlTower
    Properties:
      Name: !Sub '${AWS::StackName}-ControlTowerEvents'
      Description: Capture Control Tower CreateManagedAccount events
      EventBusName: default
      EventPattern:
        source:
          - aws.controltower
        detail-type:
          - AWS Service Event via CloudTrail
        detail:
          eventName:
            - CreateManagedAccount
            - UpdateManagedAccount
      State: ENABLED
      Targets:
        - Arn: !GetAtt AccountLifecycleEventBus.Arn
          Id: AccountLifecycleEventBus
          RoleArn: !GetAtt EventBridgeForwardingRole.Arn

  # EventBridge Rule to capture Organizations API custom events
  # Note: This rule is on the default bus to capture custom events from Lambda
  # and forward them to the AccountLifecycleEventBus
  OrganizationsApiAccountCreationRule:
    Type: AWS::Events::Rule
    Condition: UseOrganizationsApi
    Properties:
      Name: !Sub '${AWS::StackName}-OrganizationsApiEvents'
      Description: Capture Organizations API account creation events from default bus
      EventBusName: default
      EventPattern:
        source:
          - accountpoolfactory.organizations
        detail-type:
          - Account Creation Status Change
      State: ENABLED
      Targets:
        - Arn: !GetAtt AccountLifecycleEventBus.Arn
          Id: AccountLifecycleEventBus
          RoleArn: !GetAtt OrganizationsApiEventForwardingRole.Arn

  # IAM Role for EventBridge to forward Organizations API events
  OrganizationsApiEventForwardingRole:
    Type: AWS::IAM::Role
    Condition: UseOrganizationsApi
    Properties:
      RoleName: !Sub '${AWS::StackName}-OrgsApiEBForward'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: PutEventsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'events:PutEvents'
                Resource: !GetAtt AccountLifecycleEventBus.Arn
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Environment
          Value: !Ref EnvironmentTag

  # IAM Role for EventBridge to forward events
  EventBridgeForwardingRole:
    Type: AWS::IAM::Role
    Condition: UseControlTower
    Properties:
      RoleName: !Sub '${AWS::StackName}-EBForward'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: PutEventsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'events:PutEvents'
                Resource: !GetAtt AccountLifecycleEventBus.Arn
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Environment
          Value: !Ref EnvironmentTag

  # EventBridge Rule to forward events to requesting account
  ForwardToRequestingAccountRule:
    Type: AWS::Events::Rule
    Condition: EnableForwarding
    Properties:
      Name: !Sub '${AWS::StackName}-ForwardToRequestingAccount'
      Description: Forward account lifecycle events to requesting account
      EventBusName: !Ref AccountLifecycleEventBus
      EventPattern:
        source:
          - aws.controltower
          - accountpoolfactory.organizations
      State: ENABLED
      Targets:
        - Arn: !Sub 'arn:${AWS::Partition}:events:${AWS::Region}:${RequestingAccountId}:event-bus/default'
          Id: RequestingAccountEventBus
          RoleArn: !GetAtt CrossAccountEventForwardingRole.Arn

  # IAM Role for cross-account event forwarding
  CrossAccountEventForwardingRole:
    Type: AWS::IAM::Role
    Condition: EnableForwarding
    Properties:
      RoleName: !Sub '${AWS::StackName}-XAcctForward'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: PutEventsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'events:PutEvents'
                Resource: !Sub 'arn:${AWS::Partition}:events:${AWS::Region}:${RequestingAccountId}:event-bus/default'
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Environment
          Value: !Ref EnvironmentTag

  # StackSet Administration Role
  StackSetAdministrationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-SSAdmin'
      Description: Allows CloudFormation to deploy StackSets to new accounts
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: AssumeStackSetExecutionRole
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'sts:AssumeRole'
                Resource: !Sub 'arn:${AWS::Partition}:iam::*:role/AWSControlTowerExecution'
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Environment
          Value: !Ref EnvironmentTag
        - Key: Owner
          Value: !Ref OwnerTag

  # Role for requesting account to deploy approved StackSet instances
  StackSetDeploymentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-SSDeploy'
      Description: Allows requesting account to deploy instances of pre-approved StackSets only
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${RequestingAccountId}:root'
            Action: 'sts:AssumeRole'
            Condition:
              StringEquals:
                'sts:ExternalId': !Sub '${AWS::StackName}-StackSet-${RequestingAccountId}'
      ManagedPolicyArns:
        - !Ref StackSetDeploymentPolicy
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Environment
          Value: !Ref EnvironmentTag
        - Key: Owner
          Value: !Ref OwnerTag

  # Policy that restricts to approved StackSets only
  StackSetDeploymentPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub '${AWS::StackName}-StackSetDeploymentPolicy'
      Description: Allows deployment of instances for approved StackSets only
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: ManageApprovedStackSetInstances
            Effect: Allow
            Action:
              - 'cloudformation:CreateStackInstances'
              - 'cloudformation:DeleteStackInstances'
              - 'cloudformation:UpdateStackInstances'
              - 'cloudformation:DescribeStackInstance'
              - 'cloudformation:ListStackInstances'
            Resource: !Sub 'arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stackset/${AWS::StackName}-*:*'
          
          - Sid: ReadApprovedStackSets
            Effect: Allow
            Action:
              - 'cloudformation:DescribeStackSet'
              - 'cloudformation:DescribeStackSetOperation'
              - 'cloudformation:ListStackSetOperations'
              - 'cloudformation:ListStackSetOperationResults'
            Resource: !Sub 'arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stackset/${AWS::StackName}-*:*'
          
          - Sid: ListStackSets
            Effect: Allow
            Action:
              - 'cloudformation:ListStackSets'
            Resource: '*'
          
          - Sid: DenyStackSetModification
            Effect: Deny
            Action:
              - 'cloudformation:CreateStackSet'
              - 'cloudformation:UpdateStackSet'
              - 'cloudformation:DeleteStackSet'
            Resource: '*'

  # SSM Parameters for configuration
  AccountCreationStrategyParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${AWS::StackName}/AccountCreationStrategy'
      Description: Selected account creation strategy
      Type: String
      Value: !Ref AccountCreationStrategy
      Tags:
        Project: !Ref ProjectTag
        Environment: !Ref EnvironmentTag

  ControlTowerProductIdParameter:
    Type: AWS::SSM::Parameter
    Condition: UseControlTower
    Properties:
      Name: !Sub '/${AWS::StackName}/ControlTowerProductId'
      Description: Service Catalog Product ID for Control Tower Account Factory
      Type: String
      Value: !If
        - HasControlTowerProductId
        - !Ref ControlTowerProductId
        - 'AUTO_DISCOVER'
      Tags:
        Project: !Ref ProjectTag
        Environment: !Ref EnvironmentTag

  OrganizationsConfigParameter:
    Type: AWS::SSM::Parameter
    Condition: UseOrganizationsApi
    Properties:
      Name: !Sub '/${AWS::StackName}/OrganizationsConfig'
      Description: Organizations API configuration
      Type: String
      Value: !Sub |
        {
          "roleName": "${OrganizationsRoleName}",
          "iamUserAccessToBilling": "${IamUserAccessToBilling}"
        }
      Tags:
        Project: !Ref ProjectTag
        Environment: !Ref EnvironmentTag

Outputs:
  AccountCreationStrategy:
    Description: Selected account creation strategy
    Value: !Ref AccountCreationStrategy
    Export:
      Name: !Sub '${AWS::StackName}-Strategy'

  AccountCreationRoleArn:
    Description: ARN of the IAM role for requesting account to assume for account creation
    Value: !GetAtt AccountCreationRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-AccountCreationRoleArn'
  
  AccountCreationRoleName:
    Description: Name of the IAM role for account creation
    Value: !Ref AccountCreationRole
    Export:
      Name: !Sub '${AWS::StackName}-AccountCreationRoleName'
  
  ExternalId:
    Description: External ID for assuming the account creation role
    Value: !Sub '${AWS::StackName}-${RequestingAccountId}'
    Export:
      Name: !Sub '${AWS::StackName}-ExternalId'
  
  EventBusArn:
    Description: ARN of the EventBridge event bus for account lifecycle events
    Value: !GetAtt AccountLifecycleEventBus.Arn
    Export:
      Name: !Sub '${AWS::StackName}-EventBusArn'
  
  EventBusName:
    Description: Name of the EventBridge event bus
    Value: !Ref AccountLifecycleEventBus
    Export:
      Name: !Sub '${AWS::StackName}-EventBusName'
  
  StackSetAdministrationRoleArn:
    Description: ARN of the StackSet administration role
    Value: !GetAtt StackSetAdministrationRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-StackSetAdminRoleArn'
  
  StackSetDeploymentRoleArn:
    Description: ARN of the role for requesting account to deploy approved StackSet instances
    Value: !GetAtt StackSetDeploymentRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-StackSetDeploymentRoleArn'
  
  StackSetExternalId:
    Description: External ID for assuming the StackSet deployment role
    Value: !Sub '${AWS::StackName}-StackSet-${RequestingAccountId}'
    Export:
      Name: !Sub '${AWS::StackName}-StackSetExternalId'
  
  ApprovedStackSetPrefix:
    Description: Prefix for approved StackSet names
    Value: !Sub '${AWS::StackName}-'
    Export:
      Name: !Sub '${AWS::StackName}-StackSetPrefix'
