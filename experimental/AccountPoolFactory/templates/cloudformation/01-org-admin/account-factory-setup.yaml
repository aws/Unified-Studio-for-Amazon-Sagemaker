AWSTemplateFormatVersion: '2010-09-09'
Description: 'Account Pool Factory - CF1: Organization Admin Account Setup for Control Tower Account Factory Integration'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: 'Requesting Account Configuration'
        Parameters:
          - RequestingAccountId
          - RequestingAccountRoleName
      - Label:
          default: 'Event Bridge Configuration'
        Parameters:
          - EventBusName
          - EnableEventForwarding
      - Label:
          default: 'Control Tower Configuration'
        Parameters:
          - ControlTowerProductId
          - ControlTowerArtifactId
      - Label:
          default: 'Tagging'
        Parameters:
          - ProjectTag
          - EnvironmentTag
          - OwnerTag

Parameters:
  RequestingAccountId:
    Type: String
    Description: AWS Account ID that will request account creation (e.g., the account hosting the account pool management system)
    AllowedPattern: '^\d{12}$'
    ConstraintDescription: Must be a valid 12-digit AWS account ID
  
  RequestingAccountRoleName:
    Type: String
    Description: Name of the IAM role in requesting account that will trigger account creation
    Default: AccountPoolFactoryAccountCreatorRole
    AllowedPattern: '^[\w+=,.@-]{1,64}$'
  
  EventBusName:
    Type: String
    Description: Name of the EventBridge event bus for account lifecycle events
    Default: AccountPoolFactoryEventBus
    AllowedPattern: '^[\w.-]{1,256}$'
  
  EnableEventForwarding:
    Type: String
    Description: Enable forwarding of Control Tower events to Domain account
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
  
  ControlTowerProductId:
    Type: String
    Description: Service Catalog Product ID for Control Tower Account Factory (leave empty to auto-discover)
    Default: ''
  
  ControlTowerArtifactId:
    Type: String
    Description: Service Catalog Provisioning Artifact ID for Control Tower (leave empty to use latest)
    Default: ''
  
  ProjectTag:
    Type: String
    Description: Value for Project tag
    Default: AccountPoolFactory
  
  EnvironmentTag:
    Type: String
    Description: Value for Environment tag
    Default: Production
    AllowedValues:
      - Development
      - Test
      - Staging
      - Production
  
  OwnerTag:
    Type: String
    Description: Value for Owner tag
    Default: DataZoneAdmin

  # StackSet Configuration
  ApprovedStackSetTemplates:
    Type: CommaDelimitedList
    Description: S3 URLs of approved CloudFormation templates that can be deployed to new accounts
    Default: ''

Conditions:
  EnableForwarding: !Equals [!Ref EnableEventForwarding, 'true']
  HasApprovedTemplates: !Not [!Equals [!Join ['', !Ref ApprovedStackSetTemplates], '']]
  HasControlTowerProductId: !Not [!Equals [!Ref ControlTowerProductId, '']]

Resources:
  # IAM Role for requesting account to assume for account creation
  AccountCreationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-AcctCreation'
      Description: Allows requesting account to trigger Control Tower account creation
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${RequestingAccountId}:root'
            Action: 'sts:AssumeRole'
            Condition:
              StringEquals:
                'sts:ExternalId': !Sub '${AWS::StackName}-${RequestingAccountId}'
      ManagedPolicyArns:
        - !Ref AccountCreationPolicy
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Environment
          Value: !Ref EnvironmentTag
        - Key: Owner
          Value: !Ref OwnerTag
        - Key: ManagedBy
          Value: CloudFormation

  # Policy for account creation via Service Catalog
  AccountCreationPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub '${AWS::StackName}-AccountCreationPolicy'
      Description: Permissions to create accounts via Control Tower Account Factory
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          # Service Catalog permissions for Account Factory
          - Sid: ServiceCatalogAccountFactory
            Effect: Allow
            Action:
              - 'servicecatalog:ProvisionProduct'
              - 'servicecatalog:DescribeProvisionedProduct'
              - 'servicecatalog:DescribeRecord'
              - 'servicecatalog:ListProvisionedProductPlans'
              - 'servicecatalog:ListRecordHistory'
              - 'servicecatalog:ScanProvisionedProducts'
              - 'servicecatalog:TerminateProvisionedProduct'
              - 'servicecatalog:UpdateProvisionedProduct'
              - 'servicecatalog:SearchProducts'
              - 'servicecatalog:DescribeProduct'
              - 'servicecatalog:DescribeProductView'
              - 'servicecatalog:DescribeProvisioningParameters'
              - 'servicecatalog:ListLaunchPaths'
            Resource: '*'
            Condition:
              StringEquals:
                'servicecatalog:productType': 'CONTROL_TOWER_ACCOUNT'
          
          # Organizations read permissions
          - Sid: OrganizationsRead
            Effect: Allow
            Action:
              - 'organizations:DescribeOrganization'
              - 'organizations:DescribeOrganizationalUnit'
              - 'organizations:DescribeAccount'
              - 'organizations:ListAccounts'
              - 'organizations:ListAccountsForParent'
              - 'organizations:ListOrganizationalUnitsForParent'
              - 'organizations:ListRoots'
            Resource: '*'
          
          # SSO read permissions (required for Account Factory)
          - Sid: SSORead
            Effect: Allow
            Action:
              - 'sso:GetProfile'
              - 'sso:ListProfiles'
              - 'sso:ListDirectoryAssociations'
            Resource: '*'

  # EventBridge Event Bus for account lifecycle events
  AccountLifecycleEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref EventBusName
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Environment
          Value: !Ref EnvironmentTag
        - Key: Owner
          Value: !Ref OwnerTag

  # EventBridge Rule to capture Control Tower account creation events
  ControlTowerAccountCreationRule:
    Type: AWS::Events::Rule
    Condition: EnableForwarding
    Properties:
      Name: !Sub '${AWS::StackName}-ControlTowerAccountCreation'
      Description: Capture Control Tower CreateManagedAccount events
      EventBusName: default
      EventPattern:
        source:
          - aws.controltower
        detail-type:
          - AWS Service Event via CloudTrail
        detail:
          eventName:
            - CreateManagedAccount
            - UpdateManagedAccount
      State: ENABLED
      Targets:
        - Arn: !GetAtt AccountLifecycleEventBus.Arn
          Id: AccountLifecycleEventBus
          RoleArn: !GetAtt EventBridgeForwardingRole.Arn

  # IAM Role for EventBridge to forward events
  EventBridgeForwardingRole:
    Type: AWS::IAM::Role
    Condition: EnableForwarding
    Properties:
      RoleName: !Sub '${AWS::StackName}-EBForward'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: PutEventsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'events:PutEvents'
                Resource: !GetAtt AccountLifecycleEventBus.Arn
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Environment
          Value: !Ref EnvironmentTag

  # EventBridge Rule to forward events to requesting account
  ForwardToRequestingAccountRule:
    Type: AWS::Events::Rule
    Condition: EnableForwarding
    Properties:
      Name: !Sub '${AWS::StackName}-ForwardToRequestingAccount'
      Description: Forward account lifecycle events to requesting account
      EventBusName: !Ref AccountLifecycleEventBus
      EventPattern:
        source:
          - aws.controltower
        detail-type:
          - AWS Service Event via CloudTrail
      State: ENABLED
      Targets:
        - Arn: !Sub 'arn:aws:events:${AWS::Region}:${RequestingAccountId}:event-bus/default'
          Id: RequestingAccountEventBus
          RoleArn: !GetAtt CrossAccountEventForwardingRole.Arn

  # IAM Role for cross-account event forwarding
  CrossAccountEventForwardingRole:
    Type: AWS::IAM::Role
    Condition: EnableForwarding
    Properties:
      RoleName: !Sub '${AWS::StackName}-XAcctForward'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: PutEventsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'events:PutEvents'
                Resource: !Sub 'arn:aws:events:${AWS::Region}:${RequestingAccountId}:event-bus/default'
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Environment
          Value: !Ref EnvironmentTag

  # StackSet Administration Role - allows CloudFormation to assume execution role in target accounts
  StackSetAdministrationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-SSAdmin'
      Description: Allows CloudFormation to deploy StackSets to new accounts
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: AssumeStackSetExecutionRole
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'sts:AssumeRole'
                Resource: 'arn:aws:iam::*:role/AWSControlTowerExecution'
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Environment
          Value: !Ref EnvironmentTag
        - Key: Owner
          Value: !Ref OwnerTag

  # Role for requesting account to deploy approved StackSet instances
  StackSetDeploymentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-SSDeploy'
      Description: Allows requesting account to deploy instances of pre-approved StackSets only
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${RequestingAccountId}:root'
            Action: 'sts:AssumeRole'
            Condition:
              StringEquals:
                'sts:ExternalId': !Sub '${AWS::StackName}-StackSet-${RequestingAccountId}'
      ManagedPolicyArns:
        - !Ref StackSetDeploymentPolicy
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Environment
          Value: !Ref EnvironmentTag
        - Key: Owner
          Value: !Ref OwnerTag

  # Policy that restricts to approved StackSets only
  StackSetDeploymentPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub '${AWS::StackName}-StackSetDeploymentPolicy'
      Description: Allows deployment of instances for approved StackSets only
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          # Allow creating/deleting stack instances for approved StackSets
          - Sid: ManageApprovedStackSetInstances
            Effect: Allow
            Action:
              - 'cloudformation:CreateStackInstances'
              - 'cloudformation:DeleteStackInstances'
              - 'cloudformation:UpdateStackInstances'
              - 'cloudformation:DescribeStackInstance'
              - 'cloudformation:ListStackInstances'
            Resource: !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stackset/${AWS::StackName}-*:*'
          
          # Allow read-only operations on approved StackSets
          - Sid: ReadApprovedStackSets
            Effect: Allow
            Action:
              - 'cloudformation:DescribeStackSet'
              - 'cloudformation:DescribeStackSetOperation'
              - 'cloudformation:ListStackSetOperations'
              - 'cloudformation:ListStackSetOperationResults'
            Resource: !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stackset/${AWS::StackName}-*:*'
          
          # Allow listing StackSets (filtered by name prefix)
          - Sid: ListStackSets
            Effect: Allow
            Action:
              - 'cloudformation:ListStackSets'
            Resource: '*'
          
          # Explicitly DENY creating, updating, or deleting StackSets
          - Sid: DenyStackSetModification
            Effect: Deny
            Action:
              - 'cloudformation:CreateStackSet'
              - 'cloudformation:UpdateStackSet'
              - 'cloudformation:DeleteStackSet'
            Resource: '*'

  # SSM Parameter to store approved StackSet names
  ApprovedStackSetsParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${AWS::StackName}/ApprovedStackSets'
      Description: List of approved StackSet names that requesting account can deploy
      Type: StringList
      Value: !If
        - HasApprovedTemplates
        - !Join
          - ','
          - - !Sub '${AWS::StackName}-BaselineSecurity'
            - !Sub '${AWS::StackName}-DataZoneIntegration'
            - !Sub '${AWS::StackName}-CustomNetworking'
        - !Sub '${AWS::StackName}-Placeholder'
      Tags:
        Project: !Ref ProjectTag
        Environment: !Ref EnvironmentTag

  # SSM Parameter to store Control Tower Product ID (for reference)
  ControlTowerProductIdParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${AWS::StackName}/ControlTowerProductId'
      Description: Service Catalog Product ID for Control Tower Account Factory
      Type: String
      Value: !If
        - HasControlTowerProductId
        - !Ref ControlTowerProductId
        - 'AUTO_DISCOVER'
      Tags:
        Project: !Ref ProjectTag
        Environment: !Ref EnvironmentTag

Outputs:
  AccountCreationRoleArn:
    Description: ARN of the IAM role for requesting account to assume for account creation
    Value: !GetAtt AccountCreationRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-AccountCreationRoleArn'
  
  AccountCreationRoleName:
    Description: Name of the IAM role for account creation
    Value: !Ref AccountCreationRole
    Export:
      Name: !Sub '${AWS::StackName}-AccountCreationRoleName'
  
  ExternalId:
    Description: External ID for assuming the account creation role
    Value: !Sub '${AWS::StackName}-${RequestingAccountId}'
    Export:
      Name: !Sub '${AWS::StackName}-ExternalId'
  
  EventBusArn:
    Description: ARN of the EventBridge event bus for account lifecycle events
    Value: !GetAtt AccountLifecycleEventBus.Arn
    Export:
      Name: !Sub '${AWS::StackName}-EventBusArn'
  
  EventBusName:
    Description: Name of the EventBridge event bus
    Value: !Ref AccountLifecycleEventBus
    Export:
      Name: !Sub '${AWS::StackName}-EventBusName'
  
  StackName:
    Description: Name of this CloudFormation stack
    Value: !Ref AWS::StackName
  
  Region:
    Description: AWS Region where this stack is deployed
    Value: !Ref AWS::Region
  
  StackSetAdministrationRoleArn:
    Description: ARN of the StackSet administration role (used by CloudFormation service)
    Value: !GetAtt StackSetAdministrationRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-StackSetAdminRoleArn'
  
  StackSetDeploymentRoleArn:
    Description: ARN of the role for requesting account to deploy approved StackSet instances
    Value: !GetAtt StackSetDeploymentRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-StackSetDeploymentRoleArn'
  
  StackSetExternalId:
    Description: External ID for assuming the StackSet deployment role
    Value: !Sub '${AWS::StackName}-StackSet-${RequestingAccountId}'
    Export:
      Name: !Sub '${AWS::StackName}-StackSetExternalId'
  
  ApprovedStackSetPrefix:
    Description: Prefix for approved StackSet names (requesting account can only deploy StackSets with this prefix)
    Value: !Sub '${AWS::StackName}-'
    Export:
      Name: !Sub '${AWS::StackName}-StackSetPrefix'
