AWSTemplateFormatVersion: '2010-09-09'
Description: 'Account Pool Factory - Approved StackSets for New Account Setup'

Parameters:
  CF1StackName:
    Type: String
    Description: Name of the CF1 stack (used to get administration role ARN)
    Default: AccountPoolFactory-ControlTower-Test
  
  ProjectTag:
    Type: String
    Description: Value for Project tag
    Default: AccountPoolFactory
  
  EnvironmentTag:
    Type: String
    Description: Value for Environment tag
    Default: Production

Resources:
  # StackSet 1: Baseline Security Configuration
  BaselineSecurityStackSet:
    Type: AWS::CloudFormation::StackSet
    Properties:
      StackSetName: !Sub '${CF1StackName}-BaselineSecurity'
      Description: Baseline security configuration for new accounts (CloudTrail, Config, GuardDuty)
      PermissionModel: SELF_MANAGED
      AdministrationRoleARN: !Sub 
        - 'arn:aws:iam::${AWS::AccountId}:role/${CF1StackName}-StackSetAdminRole'
        - CF1StackName: !Ref CF1StackName
      ExecutionRoleName: AWSControlTowerExecution
      Capabilities:
        - CAPABILITY_NAMED_IAM
      Parameters:
        - ParameterKey: ProjectTag
          ParameterValue: !Ref ProjectTag
        - ParameterKey: EnvironmentTag
          ParameterValue: !Ref EnvironmentTag
      TemplateURL: !Sub 'https://s3.${AWS::Region}.amazonaws.com/${TemplatesBucket}/baseline-security.yaml'
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Environment
          Value: !Ref EnvironmentTag
        - Key: ManagedBy
          Value: CloudFormation
        - Key: StackSetType
          Value: Approved

  # StackSet 2: DataZone Integration
  DataZoneIntegrationStackSet:
    Type: AWS::CloudFormation::StackSet
    Properties:
      StackSetName: !Sub '${CF1StackName}-DataZoneIntegration'
      Description: DataZone domain integration (RAM share, blueprints, policy grants)
      PermissionModel: SELF_MANAGED
      AdministrationRoleARN: !Sub 
        - 'arn:aws:iam::${AWS::AccountId}:role/${CF1StackName}-StackSetAdminRole'
        - CF1StackName: !Ref CF1StackName
      ExecutionRoleName: AWSControlTowerExecution
      Capabilities:
        - CAPABILITY_NAMED_IAM
      Parameters:
        - ParameterKey: ProjectTag
          ParameterValue: !Ref ProjectTag
        - ParameterKey: EnvironmentTag
          ParameterValue: !Ref EnvironmentTag
      TemplateURL: !Sub 'https://s3.${AWS::Region}.amazonaws.com/${TemplatesBucket}/datazone-integration.yaml'
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Environment
          Value: !Ref EnvironmentTag
        - Key: ManagedBy
          Value: CloudFormation
        - Key: StackSetType
          Value: Approved

  # StackSet 3: Custom Networking
  CustomNetworkingStackSet:
    Type: AWS::CloudFormation::StackSet
    Properties:
      StackSetName: !Sub '${CF1StackName}-CustomNetworking'
      Description: Custom VPC and networking configuration for project accounts
      PermissionModel: SELF_MANAGED
      AdministrationRoleARN: !Sub 
        - 'arn:aws:iam::${AWS::AccountId}:role/${CF1StackName}-StackSetAdminRole'
        - CF1StackName: !Ref CF1StackName
      ExecutionRoleName: AWSControlTowerExecution
      Capabilities:
        - CAPABILITY_NAMED_IAM
      Parameters:
        - ParameterKey: ProjectTag
          ParameterValue: !Ref ProjectTag
        - ParameterKey: EnvironmentTag
          ParameterValue: !Ref EnvironmentTag
      TemplateURL: !Sub 'https://s3.${AWS::Region}.amazonaws.com/${TemplatesBucket}/custom-networking.yaml'
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Environment
          Value: !Ref EnvironmentTag
        - Key: ManagedBy
          Value: CloudFormation
        - Key: StackSetType
          Value: Approved

  # S3 Bucket for StackSet templates (Org Admin controls these templates)
  TemplatesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${CF1StackName}-stackset-templates-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Environment
          Value: !Ref EnvironmentTag
        - Key: ManagedBy
          Value: CloudFormation

  # Bucket Policy - only this account can access
  TemplatesBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref TemplatesBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFormationRead
            Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action:
              - 's3:GetObject'
              - 's3:GetObjectVersion'
            Resource: !Sub '${TemplatesBucket.Arn}/*'
            Condition:
              StringEquals:
                'aws:SourceAccount': !Ref AWS::AccountId
          
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt TemplatesBucket.Arn
              - !Sub '${TemplatesBucket.Arn}/*'
            Condition:
              Bool:
                'aws:SecureTransport': false

Outputs:
  BaselineSecurityStackSetId:
    Description: ID of the Baseline Security StackSet
    Value: !GetAtt BaselineSecurityStackSet.StackSetId
    Export:
      Name: !Sub '${CF1StackName}-BaselineSecurityStackSetId'
  
  DataZoneIntegrationStackSetId:
    Description: ID of the DataZone Integration StackSet
    Value: !GetAtt DataZoneIntegrationStackSet.StackSetId
    Export:
      Name: !Sub '${CF1StackName}-DataZoneIntegrationStackSetId'
  
  CustomNetworkingStackSetId:
    Description: ID of the Custom Networking StackSet
    Value: !GetAtt CustomNetworkingStackSet.StackSetId
    Export:
      Name: !Sub '${CF1StackName}-CustomNetworkingStackSetId'
  
  TemplatesBucketName:
    Description: S3 bucket containing approved StackSet templates
    Value: !Ref TemplatesBucket
    Export:
      Name: !Sub '${CF1StackName}-TemplatesBucket'
  
  TemplatesBucketArn:
    Description: ARN of the templates bucket
    Value: !GetAtt TemplatesBucket.Arn
    Export:
      Name: !Sub '${CF1StackName}-TemplatesBucketArn'
  
  ApprovedStackSets:
    Description: Comma-separated list of approved StackSet names
    Value: !Sub '${CF1StackName}-BaselineSecurity,${CF1StackName}-DataZoneIntegration,${CF1StackName}-CustomNetworking'
    Export:
      Name: !Sub '${CF1StackName}-ApprovedStackSetsList'
